<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="32" height="32">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="100%" stop-color="#111" />
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <style>
      .body { fill: url(#bodyGrad); stroke: #111; stroke-width: 0.8; }
      .glow { fill: url(#glow); }
      .stick { fill: #404040; stroke: #777; stroke-width: 0.8; }
      .stick-center { fill: #111; }
      .button { stroke: #111; stroke-width: 0.7; }
      .triangle { fill: #3ee97c; }
      .circle { fill: #ff596e; }
      .cross { fill: #5d78ff; }
      .square { fill: #ffdc52; }
      .dpad { fill: #4a4a4a; }
      .trigger { fill: #161616; stroke: #111; stroke-width: 0.6; }
    </style>
  </defs>

  <!-- Cuerpo del mando -->
  <path class="body" d="M18,46 C15,25 28,22 38,22 H82 C92,22 105,25 102,46 C100,67 83,69 66,69 H54 C37,69 20,67 18,46 Z"/>
  <path class="glow" d="M18,46 C15,25 28,22 38,22 H82 C92,22 105,25 102,46 C100,67 83,69 66,69 H54 C37,69 20,67 18,46 Z"/>

  <!-- Sticks analógicos -->
  <g class="stick">
    <circle cx="34" cy="35" r="9" />
    <circle class="stick-center" cx="34" cy="35" r="4" />
  </g>
  <g class="stick">
    <circle cx="84" cy="35" r="9" />
    <circle class="stick-center" cx="84" cy="35" r="4" />
  </g>

  <!-- D-pad -->
  <g class="dpad">
    <rect x="14" y="33" width="6" height="14" rx="2" />
    <rect x="11" y="39" width="12" height="6" rx="2" />
  </g>

  <!-- Botones -->
  <polygon points="76,18 81,26 86,18" class="triangle button" />
  <circle cx="96" cy="22" r="5" class="circle button" />
  <g class="button">
    <rect x="72" y="24" width="8" height="3" rx="1" fill="#272727" />
    <rect x="75" y="21" width="3" height="8" rx="1" fill="#272727" />
  </g>
  <rect x="90" y="24" width="7" height="7" rx="2" class="square button" />

  <!-- Gatillos -->
  <rect x="8" y="31" width="9" height="4" rx="2" class="trigger" />
  <rect x="103" y="31" width="9" height="4" rx="2" class="trigger" />

  <!-- Detalles de luz -->
  <path d="M30,28 C38,22 48,22 56,28" fill="none" stroke="#4f4f4f" stroke-width="1" opacity="0.6" />
  <path d="M64,28 C72,22 82,22 90,28" fill="none" stroke="#4f4f4f" stroke-width="1" opacity="0.6" />
</svg>
